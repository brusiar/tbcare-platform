services:
  postgres:
    image: postgres:16-alpine
    container_name: tbcare-postgres
    environment:
      POSTGRES_DB: tbcare
      POSTGRES_USER: tbcare
      POSTGRES_PASSWORD: tbcare
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tbcare"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tbcare-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tbcare
      DB_USER: tbcare
      DB_PASSWORD: tbcare
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://ademir:8081/api
    container_name: tbcare-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://ademir:8081/api
    ports:
      - "3002:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
