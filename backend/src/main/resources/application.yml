spring:
  application:
    name: tbcare-platform

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tbcare}
    username: ${DB_USER:tbcare}
    password: ${DB_PASSWORD:tbcare}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.tbcare: DEBUG
    org.flywaydb: INFO

app:
  jwt:
    secret: ${JWT_SECRET:tbcare-secret-key-change-in-production-min-256-bits-required-for-hs256-algorithm}
    expiration: ${JWT_EXPIRATION:86400000}
